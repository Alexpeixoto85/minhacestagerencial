
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cesta · Gerencial</title>
<style>
  :root{
    --verde-fundo:#0f2e22;--verde-escuro:#1b4332;--verde:#2d6a4f;--verde-claro:#40916c;
    --verde-suave:#74c69d;--verde-papel:#eef3ec;--creme:#fbfdf8;--oferta:#ffb703;--oferta-forte:#fb8500;
    --preco-promo:#d62828;--tinta:#13241c;--cinza:#647067;--linha:#dde6db;--branco:#fff;
    --sombra:0 1px 2px rgba(15,46,34,.06),0 8px 24px rgba(15,46,34,.08);--raio:14px;
    --gestao:#264653;--gestao-claro:#2a9d8f;--patroc:#7048e8;--patroc-claro:#9775fa;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Segoe UI",system-ui,-apple-system,Roboto,sans-serif;background:var(--verde-papel);color:var(--tinta);line-height:1.5;min-height:100vh}
  h1,h2,h3{font-family:Georgia,"Times New Roman",serif;letter-spacing:-.01em;line-height:1.15}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  input,select,textarea{font-family:inherit;font-size:15px}
  a{color:var(--verde);text-decoration:none}

  .topo{background:var(--gestao);color:#eaf3ec;padding:14px 20px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:50;box-shadow:0 4px 16px rgba(15,46,34,.18)}
  .marca{display:flex;align-items:center;gap:11px;font-weight:700;font-size:20px;font-family:Georgia,serif}
  .marca .cesta{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;background:linear-gradient(135deg,var(--gestao-claro),#1d6f64);font-size:18px}
  .marca .selo-g{font-size:11px;background:rgba(255,255,255,.15);padding:3px 9px;border-radius:20px;letter-spacing:.06em;text-transform:uppercase;font-family:"Segoe UI",sans-serif;font-weight:600}
  .topo .dir{margin-left:auto;display:flex;align-items:center;gap:12px}
  .quem{font-size:13px;opacity:.9;text-align:right}
  .quem b{display:block;font-size:14px}
  .quem span{font-size:11px;opacity:.65}
  .btn-sair{background:rgba(255,255,255,.12);color:#eaf3ec;padding:8px 14px;border-radius:9px;font-size:13px;font-weight:600}
  .btn-sair:hover{background:rgba(255,255,255,.22)}
  main{max-width:1040px;margin:0 auto;padding:26px 18px 80px}

  .btn{background:var(--gestao);color:#fff;padding:11px 20px;border-radius:10px;font-weight:600;font-size:15px;transition:.15s;display:inline-flex;align-items:center;gap:8px;justify-content:center}
  .btn:hover{background:#1c3742;transform:translateY(-1px)}
  .btn:active{transform:translateY(0)}
  .btn.full{width:100%}
  .btn.verde{background:var(--verde)}.btn.verde:hover{background:var(--verde-escuro)}
  .btn.fantasma{background:transparent;color:var(--gestao);box-shadow:inset 0 0 0 1.5px var(--gestao-claro)}
  .btn.fantasma:hover{background:#eaf1f0}
  .btn.oferta{background:var(--oferta-forte)}.btn.oferta:hover{background:#e07600}
  .btn.patroc{background:var(--patroc)}.btn.patroc:hover{background:#5f3dc4}
  .btn.perigo{background:#fff;color:var(--preco-promo);box-shadow:inset 0 0 0 1.5px #f2c1c1}.btn.perigo:hover{background:#fdf0f0}
  .btn.peq{padding:7px 13px;font-size:13px;border-radius:8px}
  .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

  .cartao{background:var(--branco);border-radius:var(--raio);box-shadow:var(--sombra);padding:22px}
  .campo{margin-bottom:14px}
  .campo label{display:block;font-size:13px;font-weight:600;color:var(--gestao);margin-bottom:5px}
  .campo input,.campo select,.campo textarea{width:100%;padding:11px 13px;border:1.5px solid var(--linha);border-radius:10px;background:var(--creme);color:var(--tinta)}
  .campo input:focus,.campo select:focus,.campo textarea:focus{outline:none;border-color:var(--gestao-claro);background:#fff}
  .campo textarea{resize:vertical;min-height:70px}
  .linha-campos{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .linha-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
  @media(max-width:560px){.linha-campos,.linha-3{grid-template-columns:1fr}}
  .cep-linha{display:flex;gap:8px;align-items:flex-end}
  .cep-linha .campo{flex:1;margin-bottom:0}

  .foto-campo{margin-bottom:14px}
  .foto-drop{display:flex;align-items:center;gap:14px;border:1.5px dashed var(--linha);border-radius:12px;padding:12px;background:var(--creme)}
  .foto-previa{width:70px;height:70px;border-radius:10px;object-fit:cover;background:#eef3ec;flex-shrink:0;display:grid;place-items:center;font-size:26px;color:var(--cinza)}
  .foto-acoes{flex:1;display:flex;flex-direction:column;gap:7px}
  .foto-acoes .min{font-size:11.5px;color:var(--cinza)}

  .portal{min-height:calc(100vh - 60px);display:grid;place-items:center;padding:30px 18px}
  .portal-caixa{width:100%;max-width:420px}
  .portal-cabeca{text-align:center;margin-bottom:24px}
  .portal-cabeca .sel{width:64px;height:64px;border-radius:18px;margin:0 auto 14px;display:grid;place-items:center;background:linear-gradient(135deg,var(--gestao-claro),#1d6f64);font-size:30px;box-shadow:var(--sombra)}
  .portal-cabeca h1{font-size:28px;color:var(--gestao)}
  .portal-cabeca p{color:var(--cinza);margin-top:4px;font-size:14px}
  .papeis{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
  .papel-op{border:1.5px solid var(--linha);border-radius:12px;padding:14px 8px;text-align:center;background:var(--creme);transition:.15s}
  .papel-op .ic{font-size:24px;display:block;margin-bottom:5px}
  .papel-op .nm{font-size:13px;font-weight:600;color:var(--gestao)}
  .papel-op.on{border-color:var(--gestao-claro);background:#fff;box-shadow:0 0 0 3px rgba(42,157,143,.16)}
  .dica-login{font-size:12px;color:var(--cinza);text-align:center;margin-top:14px}
  .dica-login code{background:var(--verde-papel);padding:2px 6px;border-radius:5px;color:var(--gestao);font-size:11.5px}

  .voltar{display:inline-flex;align-items:center;gap:6px;color:var(--cinza);font-size:14px;font-weight:600;margin-bottom:14px;padding:5px 0;cursor:pointer}
  .voltar:hover{color:var(--gestao)}
  .barra-secoes{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px}
  .barra-secoes button{padding:9px 16px;border-radius:10px;font-weight:600;font-size:14px;color:var(--cinza);background:#fff;box-shadow:var(--sombra)}
  .barra-secoes button.on{background:var(--gestao);color:#fff}
  .barra-secoes button.on.pat{background:var(--patroc)}
  .titulo-secao{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:12px;flex-wrap:wrap}
  .titulo-secao h2{font-size:23px;color:var(--gestao)}
  .titulo-secao .sub{font-size:13px;color:var(--cinza);margin-top:2px}

  .grade{display:grid;gap:14px}
  .item-linha{background:#fff;border-radius:12px;box-shadow:var(--sombra);padding:14px 16px;display:flex;align-items:center;gap:14px}
  .item-linha .corpo{flex:1;min-width:0}
  .item-linha .nome{font-weight:600;color:var(--gestao)}
  .item-linha .meta{font-size:12.5px;color:var(--cinza);margin-top:2px}
  .item-foto{width:48px;height:48px;border-radius:10px;object-fit:cover;flex-shrink:0;background:#eef3ec}
  .acoes{display:flex;gap:7px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
  .vazio{text-align:center;padding:42px 20px;color:var(--cinza)}
  .vazio .ic{font-size:40px;opacity:.5;margin-bottom:10px}
  .vazio p{font-size:14.5px}.vazio .btn{margin-top:16px}

  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:13px;margin-bottom:22px}
  .stat{background:#fff;border-radius:13px;box-shadow:var(--sombra);padding:16px 18px}
  .stat .n{font-size:28px;font-weight:800;color:var(--gestao);font-family:Georgia,serif}
  .stat .r{font-size:12.5px;color:var(--cinza);margin-top:1px}

  .info-merc{background:#fff;border-radius:13px;box-shadow:var(--sombra);padding:16px 18px;display:flex;align-items:center;gap:14px;margin-bottom:20px}
  .info-merc .av{width:50px;height:50px;border-radius:12px;background:linear-gradient(135deg,var(--gestao-claro),#1d6f64);display:grid;place-items:center;font-size:24px;flex-shrink:0;color:#fff;overflow:hidden}
  .info-merc .av img{width:100%;height:100%;object-fit:cover}
  .info-merc .corpo{flex:1}
  .info-merc .corpo b{color:var(--gestao);font-size:17px}
  .info-merc .corpo div{font-size:12.5px;color:var(--cinza)}
  .pin{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;color:var(--gestao-claro);font-weight:600}

  .tag{display:inline-block;font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px}
  .tag.promo{background:#fdeaea;color:var(--preco-promo)}
  .tag.on{background:#e8f6ef;color:#1b6b4f}
  .tag.off{background:#eef0f2;color:var(--cinza)}

  .banners{display:grid;gap:14px;grid-template-columns:repeat(auto-fill,minmax(260px,1fr))}
  .banner{border-radius:16px;padding:20px 22px;color:#3a2400;position:relative;overflow:hidden;min-height:130px;display:flex;flex-direction:column;justify-content:flex-end;background:linear-gradient(120deg,var(--oferta),var(--oferta-forte));box-shadow:0 6px 20px rgba(251,133,0,.25)}
  .banner.verde{background:linear-gradient(120deg,#74c69d,#2d6a4f);color:#06281c;box-shadow:0 6px 20px rgba(45,106,79,.25)}
  .banner.com-foto{color:#fff}
  .banner .bg{position:absolute;inset:0;background-size:cover;background-position:center;z-index:0}
  .banner .bg::after{content:"";position:absolute;inset:0;background:linear-gradient(transparent,rgba(0,0,0,.62))}
  .banner::after{content:"";position:absolute;right:-30px;top:-30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.16);z-index:0}
  .banner.com-foto::after{display:none}
  .banner>*{position:relative;z-index:1}
  .banner .et{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;opacity:.82}
  .banner h3{font-size:21px;margin:6px 0 4px}
  .banner p{font-size:13px;max-width:90%}
  .banner .val{margin-top:8px;font-size:11px;font-weight:600;opacity:.85}
  .banner .ed{position:absolute;top:12px;right:12px;display:flex;gap:6px;z-index:2}
  .pcard{background:#fff;border-radius:16px;box-shadow:var(--sombra);overflow:hidden;display:flex;flex-direction:column}
  .pcard .ph{height:150px;background:linear-gradient(120deg,var(--patroc-claro),var(--patroc));background-size:cover;background-position:center;display:grid;place-items:center;color:#fff;font-size:36px}
  .pcard .bd{padding:15px 17px;flex:1;display:flex;flex-direction:column;gap:5px}
  .pcard .bd h3{font-size:18px;color:var(--gestao)}
  .pcard .bd p{font-size:13px;color:var(--cinza)}
  .pcard .rod{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:12px 17px;border-top:1px solid var(--linha)}

  .modal-fundo{position:fixed;inset:0;background:rgba(15,46,34,.55);display:none;place-items:center;z-index:100;padding:18px;backdrop-filter:blur(2px)}
  .modal-fundo.on{display:grid}
  .modal{background:#fff;border-radius:18px;width:100%;max-width:540px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .modal-cabeca{padding:18px 22px;border-bottom:1px solid var(--linha);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:2}
  .modal-cabeca h3{font-size:19px;color:var(--gestao)}
  .modal-cabeca .x{font-size:24px;color:var(--cinza);line-height:1}
  .modal-corpo{padding:22px}
  .modal-pe{padding:0 22px 22px;display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap}
  .ajuda{font-size:12px;color:var(--cinza);background:var(--verde-papel);padding:10px 12px;border-radius:9px;margin-bottom:12px;line-height:1.5}
  .ajuda code{background:#fff;padding:1px 5px;border-radius:4px;color:var(--gestao)}

  .toast-area{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:8px;align-items:center}
  .toast{background:var(--gestao);color:#eaf3ec;padding:12px 20px;border-radius:30px;font-size:14px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.25);animation:sobe .3s;display:flex;align-items:center;gap:8px}
  .toast.erro{background:var(--preco-promo)}
  @keyframes sobe{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

  .carregando{position:fixed;inset:0;background:var(--verde-papel);display:grid;place-items:center;z-index:300}
  .spinner{width:40px;height:40px;border:4px solid var(--linha);border-top-color:var(--gestao-claro);border-radius:50%;animation:gira 1s linear infinite}
  @keyframes gira{to{transform:rotate(360deg)}}
  .nuvem{font-size:11px;color:var(--cinza);display:inline-flex;align-items:center;gap:5px}
  .nuvem .pt{width:7px;height:7px;border-radius:50%;background:var(--gestao-claro);box-shadow:0 0 0 3px rgba(42,157,143,.2)}
  .escondido{display:none!important}
  @media(max-width:560px){.papeis{grid-template-columns:1fr}}
</style>
</head>
<body>

<div id="carregando" class="carregando"><div class="spinner"></div></div>

<!-- PORTAL -->
<div id="tela-portal" class="portal escondido">
  <div class="portal-caixa">
    <div class="portal-cabeca">
      <div class="sel">⚙️</div>
      <h1>Cesta · Gerencial</h1>
      <p>Acesso restrito — administração e lojas</p>
    </div>
    <div class="cartao">
      <div class="papeis">
        <div class="papel-op on" data-papel="admin" onclick="selPapel('admin')"><span class="ic">⚙️</span><span class="nm">Administrador</span></div>
        <div class="papel-op" data-papel="supermercado" onclick="selPapel('supermercado')"><span class="ic">🏪</span><span class="nm">Supermercado</span></div>
      </div>
      <div class="campo"><label id="lbl-user">Usuário</label><input id="entrar-user" type="text" placeholder="admin"></div>
      <div class="campo"><label>Senha</label><input id="entrar-senha" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')fazerLogin()"></div>
      <button class="btn full" onclick="fazerLogin()">Entrar</button>
      <p class="dica-login" id="dica-login"></p>
      <p class="dica-login" style="margin-top:18px;opacity:.7">É cliente? <a href="#" id="link-site">Acesse o site da Cesta</a></p>
    </div>
  </div>
</div>

<!-- TOPO -->
<div id="topo" class="topo escondido">
  <div class="marca"><span class="cesta">🛒</span><span>Cesta</span><span class="selo-g">Gerencial</span></div>
  <div class="dir">
    <span class="nuvem" id="status-nuvem"><span class="pt"></span> nuvem</span>
    <div class="quem"><span>conectado como</span><b id="topo-nome"></b></div>
    <button class="btn-sair" onclick="sair()">Sair</button>
  </div>
</div>

<main id="conteudo" class="escondido"></main>

<div id="modal-fundo" class="modal-fundo" onclick="if(event.target===this)fecharModal()">
  <div class="modal">
    <div class="modal-cabeca"><h3 id="modal-titulo">Título</h3><button class="x" onclick="fecharModal()">×</button></div>
    <div class="modal-corpo" id="modal-corpo"></div>
    <div class="modal-pe" id="modal-pe"></div>
  </div>
</div>
<div class="toast-area" id="toast-area"></div>

<script type="module">
/* ============================================================
   CESTA · GERENCIAL — Firebase Firestore (admin + supermercados)
   ============================================================ */
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import {
  getFirestore, collection, doc, getDoc, getDocs, addDoc, setDoc, updateDoc,
  deleteDoc, query, where, writeBatch
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAI438jAhAjqJUh16cCeQK7jN2xOy5N2LQ",
  authDomain: "minha-cesta-a9292.firebaseapp.com",
  projectId: "minha-cesta-a9292",
  storageBucket: "minha-cesta-a9292.firebasestorage.app",
  messagingSenderId: "266680672755",
  appId: "1:266680672755:web:64905352f65a93f3187286",
  measurementId: "G-DBTYX7WSWP"
};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

/* ====== camada de dados ====== */
async function fsAll(col){ const s=await getDocs(collection(db,col)); return s.docs.map(d=>({id:d.id,...d.data()})); }
async function fsGet(col,id){ const s=await getDoc(doc(db,col,id)); return s.exists()?{id:s.id,...s.data()}:null; }
async function fsAdd(col,obj){ const r=await addDoc(collection(db,col),obj); return r.id; }
async function fsSet(col,id,obj){ await setDoc(doc(db,col,id),obj); }
async function fsUpd(col,id,obj){ await updateDoc(doc(db,col,id),obj); }
async function fsDel(col,id){ await deleteDoc(doc(db,col,id)); }
async function fsWhere(col,campo,val){ const s=await getDocs(query(collection(db,col),where(campo,"==",val))); return s.docs.map(d=>({id:d.id,...d.data()})); }

/* ====== utilidades ====== */
const $ = s=>document.querySelector(s);
const reais = v=>"R$ "+(Number(v)||0).toFixed(2).replace(".",",");
function esc(s){return String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
const EMOJI_CAT={Mercearia:"🛒",Hortifruti:"🥬","Laticínios":"🥛",Bebidas:"🥤",Limpeza:"🧼","Higiene":"🧴",Padaria:"🥖","Açougue":"🥩",Congelados:"🧊",Outros:"📦"};
const CATEGORIAS=["Mercearia","Hortifruti","Laticínios","Bebidas","Limpeza","Higiene","Padaria","Açougue","Congelados","Outros"];

function toast(msg,erro=false){
  const t=document.createElement("div");
  t.className="toast"+(erro?" erro":"");
  t.innerHTML=(erro?"⚠️ ":"✓ ")+esc(msg);
  $("#toast-area").appendChild(t);
  setTimeout(()=>{t.style.opacity="0";t.style.transition=".3s";setTimeout(()=>t.remove(),300);},2800);
}
function abrirModal(titulo,corpo,rodape=""){
  $("#modal-titulo").textContent=titulo; $("#modal-corpo").innerHTML=corpo; $("#modal-pe").innerHTML=rodape;
  $("#modal-fundo").classList.add("on");
}
function fecharModal(){$("#modal-fundo").classList.remove("on");}
function confirmar(titulo,texto,fn,rotulo="Confirmar"){
  abrirModal(titulo,`<p style="color:var(--cinza);font-size:14.5px">${esc(texto)}</p>`,
    `<button class="btn fantasma" onclick="fecharModal()">Cancelar</button>
     <button class="btn" style="background:var(--preco-promo)" id="btn-conf">${esc(rotulo)}</button>`);
  $("#btn-conf").onclick=async()=>{ await fn(); fecharModal(); };
}
function vazioHTML(ic,t,p,onclick="",botao=""){
  return `<div class="vazio"><div class="ic">${ic}</div><b style="color:var(--gestao);font-size:16px">${esc(t)}</b><p>${esc(p)}</p>${botao?`<button class="btn" onclick="${onclick}">${esc(botao)}</button>`:""}</div>`;
}

/* ====== FOTOS: compressão e campo reaproveitável ====== */
// guarda o data URL atual de cada campo de foto por chave
const FOTOS={};
function comprimirImagem(file, maxDim=720, q=0.72){
  return new Promise((res,rej)=>{
    if(!file) return rej("sem arquivo");
    if(file.size>8*1024*1024) return rej("Imagem muito grande (máx 8MB). Escolha outra.");
    const fr=new FileReader();
    fr.onload=()=>{
      const img=new Image();
      img.onload=()=>{
        let{width:w,height:h}=img;
        if(w>h && w>maxDim){h=Math.round(h*maxDim/w);w=maxDim;}
        else if(h>=w && h>maxDim){w=Math.round(w*maxDim/h);h=maxDim;}
        const cv=document.createElement("canvas");cv.width=w;cv.height=h;
        cv.getContext("2d").drawImage(img,0,0,w,h);
        res(cv.toDataURL("image/jpeg",q));
      };
      img.onerror=()=>rej("Arquivo não é uma imagem válida.");
      img.src=fr.result;
    };
    fr.onerror=()=>rej("Falha ao ler a imagem.");
    fr.readAsDataURL(file);
  });
}
// devolve o HTML de um campo de foto; `chave` identifica os inputs
function campoFotoHTML(chave,label,valorAtual="",emojiFallback="🖼️"){
  FOTOS[chave]=valorAtual||"";
  const previa=valorAtual
    ? `<img src="${valorAtual}" class="foto-previa" id="prev-${chave}">`
    : `<div class="foto-previa" id="prev-${chave}">${emojiFallback}</div>`;
  return `<div class="foto-campo"><label style="display:block;font-size:13px;font-weight:600;color:var(--gestao);margin-bottom:6px">${esc(label)}</label>

        <div class="min" id="min-${chave}">JPG/PNG · será redimensionada para caber na nuvem.</div>

// liga os eventos do campo de foto após inserir no DOM
function ligarCampoFoto(chave){
  const fileEl=$("#file-"+chave), urlEl=$("#url-"+chave), prev=$("#prev-"+chave), min=$("#min-"+chave);
  const setPrev=src=>{
    if(prev.tagName==="IMG"){ prev.src=src; }
    else { const img=new Image(); img.className="foto-previa"; img.id="prev-"+chave; img.src=src; prev.replaceWith(img); }
  };
  fileEl?.addEventListener("change",async e=>{
    const f=e.target.files[0]; if(!f) return;
    min.textContent="Processando imagem…";
    try{ const d=await comprimirImagem(f); FOTOS[chave]=d; setPrev(d); min.textContent="Imagem pronta ✓"; if(urlEl)urlEl.value=""; }
    catch(err){ min.textContent=String(err); toast(String(err),true); }
  });
  urlEl?.addEventListener("input",()=>{
    const u=urlEl.value.trim();
    if(/^https?:\/\//i.test(u)){ FOTOS[chave]=u; setPrev(u); min.textContent="Usando link externo ✓"; }
    else if(!u && !($("#file-"+chave)?.files?.length)){ FOTOS[chave]=""; }
  });
}

/* ====== CEP → geolocalização (ViaCEP + Nominatim/OSM) ====== */
async function buscarCEP(cep){
  const limpo=String(cep).replace(/\D/g,"");
  if(limpo.length!==8) throw new Error("CEP deve ter 8 dígitos.");
  const r=await fetch(`https://viacep.com.br/ws/${limpo}/json/`);
  const j=await r.json();
  if(j.erro) throw new Error("CEP não encontrado.");
  return {cep:limpo,logradouro:j.logradouro||"",bairro:j.bairro||"",cidade:j.localidade||"",uf:j.uf||""};
}
async function geocodificar(texto){
  const url=`https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=br&q=${encodeURIComponent(texto)}`;
  const r=await fetch(url,{headers:{"Accept":"application/json"}});
  const j=await r.json();
  if(!j.length) return null;
  return {lat:parseFloat(j[0].lat),lng:parseFloat(j[0].lon)};
}

    ${ehAdmin?`<a class="voltar" onclick="telaAdmin()">‹ Voltar aos supermercados</a>`:""}
    <div class="info-merc">
      <div class="av">${m.emoji||"🏬"}</div>
      <div class="corpo"><b>${esc(m.nome)}</b>
        <div>${esc(m.endereco||"Endereço não informado")} · ${esc(m.email)}</div>
        <div>${m.cep?`<span class="pin">📍 CEP ${esc(m.cep.replace(/(\d{5})(\d{3})/,"$1-$2"))}</span>`:`<span style="color:var(--preco-promo);font-weight:600">⚠ CEP não informado</span>`}</div>
      </div>
      <button class="btn fantasma peq" onclick="formSupermercado('${m.id}')">Editar dados</button>
    </div>
    <div class="stats">
      <div class="stat"><div class="n">${prods.length}</div><div class="r">Produtos</div></div>
      <div class="stat"><div class="n">${prods.filter(p=>p.emPromocao).length}</div><div class="r">Em promoção</div></div>
      <div class="stat"><div class="n">${ofertas.length}</div><div class="r">Ofertas (banners)</div></div>
    </div>
    <div class="barra-secoes">
      <button class="${abaLoja==='produtos'?'on':''}" onclick="irLoja('produtos')">📦 Mercadorias</button>
      <button class="${abaLoja==='ofertas'?'on':''}" onclick="irLoja('ofertas')">🏷️ Ofertas</button>
    </div>
    <div id="loja-corpo"></div>`;
  abaLoja==="produtos" ? renderProdutos(prods) : renderOfertas(ofertas);
}
function irLoja(aba){ abaLoja=aba; painelLoja(lojaAtual.id,lojaAtual.ehAdmin); }

function renderProdutos(prods){
  const c=$("#loja-corpo");
  let html=`<div class="titulo-secao">
      <div><h2>Mercadorias da loja</h2><div class="sub">Catálogo individual — cadastre com foto, importe ou atualize itens</div></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn fantasma" onclick="importarProdutos()">⬆️ Importar lista</button>
        <button class="btn" onclick="formProduto()">+ Produto</button>
      </div>
    </div>`;
  if(!prods.length){ c.innerHTML=html+vazioHTML("📦","Nenhuma mercadoria","Adicione um produto ou importe a lista completa de uma vez","importarProdutos()","⬆️ Importar lista"); return; }
  const grupos={}; prods.forEach(p=>{(grupos[p.categoria]??=[]).push(p);});
  for(const cat of Object.keys(grupos).sort()){
    html+=`<div style="margin:6px 0 9px;font-weight:700;color:var(--gestao);font-size:14px">${EMOJI_CAT[cat]||"📦"} ${esc(cat)} <span style="color:var(--cinza);font-weight:400">· ${grupos[cat].length}</span></div>`;
    html+=`<div class="grade" style="margin-bottom:18px">`;
    for(const p of grupos[cat]){
      const promo=p.emPromocao&&p.precoPromocional;
      const fig=p.foto?`<img src="${p.foto}" class="item-foto" alt="">`:`<div style="font-size:28px">${p.emoji||"🛒"}</div>`;
      html+=`<div class="item-linha">
        ${fig}
        <div class="corpo">
          <div class="nome">${esc(p.nome)}</div>
          <div class="meta">${promo?`<span class="tag promo">PROMO</span> <s style="color:var(--cinza)">${reais(p.preco)}</s> <b style="color:var(--preco-promo)">${reais(p.precoPromocional)}</b>`:`<b style="color:var(--gestao)">${reais(p.preco)}</b>`}</div>
        </div>
        <div class="acoes">
          <button class="btn ${p.emPromocao?'oferta':'fantasma'} peq" onclick="alternarPromo('${p.id}')">${p.emPromocao?'★':'☆'} Promo</button>
          <button class="btn fantasma peq" onclick="formProduto('${p.id}')">Editar</button>
          <button class="btn perigo peq" onclick="excluirProduto('${p.id}')">🗑</button>
        </div>
      </div>`;
    }
    html+=`</div>`;
  }
  c.innerHTML=html;
}

async function formProduto(id=null){
  let ed=null;
  try{ ed=id?await fsGet("produtos",id):null; }
  catch(e){ console.error(e); toast("Erro ao carregar dados do produto.",true); return; }
  if(id&&!ed){ toast("Produto não encontrado.",true); return; }
  abrirModal(ed?"Editar produto":"Novo produto",`
    <div class="campo"><label>Nome do produto</label><input id="p-nome" value="${esc(ed?.nome||"")}" placeholder="Ex.: Arroz tipo 1 — 5kg"></div>
    <div class="linha-campos">
      <div class="campo"><label>Categoria</label><select id="p-cat">${CATEGORIAS.map(c=>`<option ${ed?.categoria===c?"selected":""}>${c}</option>`).join("")}</select></div>
      <div class="campo"><label>Ícone (sem foto)</label><input id="p-emoji" value="${esc(ed?.emoji||"🛒")}" maxlength="2"></div>
    </div>
    ${campoFotoHTML("p-foto","Foto do produto",ed?.foto||"","🛒")}
    <div class="linha-campos">
      <div class="campo"><label>Preço normal (R$)</label><input id="p-preco" type="number" step="0.01" min="0" value="${ed?.preco??""}" placeholder="0,00"></div>
      <div class="campo"><label>Preço promocional (R$)</label><input id="p-promo" type="number" step="0.01" min="0" value="${ed?.precoPromocional??""}" placeholder="opcional"></div>
    </div>
    <label style="display:flex;align-items:center;gap:9px;font-size:14px;color:var(--gestao);font-weight:600;cursor:pointer;margin-top:4px">
      <input id="p-empromo" type="checkbox" ${ed?.emPromocao?"checked":""} style="width:18px;height:18px;accent-color:var(--verde)"> Exibir como promoção no site
    </label>
  `,`
    <button class="btn fantasma" onclick="fecharModal()">Cancelar</button>
    <button class="btn" id="p-salvar">${ed?"Salvar":"Adicionar"}</button>
  `);
  ligarCampoFoto("p-foto");
  $("#p-salvar").onclick=async()=>{
    const nome=$("#p-nome").value.trim(), preco=parseFloat($("#p-preco").value);
    if(!nome||isNaN(preco)) return toast("Informe nome e preço.",true);
    const promoVal=parseFloat($("#p-promo").value), emPromo=$("#p-empromo").checked;
    if(emPromo&&(isNaN(promoVal)||promoVal<=0)) return toast("Defina o preço promocional para marcar promoção.",true);
    const obj={supermercadoId:lojaAtual.id,nome,categoria:$("#p-cat").value,emoji:$("#p-emoji").value.trim()||"🛒",
      foto:FOTOS["p-foto"]||"",preco,precoPromocional:isNaN(promoVal)?null:promoVal,emPromocao:emPromo,unidade:"un"};
    $("#p-salvar").disabled=true;
    try{
      if(ed){ await fsSet("produtos",id,obj); toast("Produto atualizado."); }
      else{ await fsAdd("produtos",obj); toast("Produto adicionado."); }
      fecharModal(); painelLoja(lojaAtual.id,lojaAtual.ehAdmin);
    }catch(e){ console.error(e); toast("Erro ao salvar.",true); $("#p-salvar").disabled=false; }
  };
}
async function alternarPromo(id){
  let p;
  try{ p=await fsGet("produtos",id); }catch(e){ console.error(e); return toast("Erro ao buscar produto.",true); }
  if(!p) return toast("Produto não encontrado.",true);
  if(!p.emPromocao&&(!p.precoPromocional||p.precoPromocional<=0)){ toast("Defina um preço promocional editando o produto.",true); return formProduto(id); }
  await fsUpd("produtos",id,{emPromocao:!p.emPromocao});
  toast(!p.emPromocao?"Produto em promoção.":"Promoção retirada.");
  painelLoja(lojaAtual.id,lojaAtual.ehAdmin);
}
function excluirProduto(id){
  confirmar("Excluir produto","O produto sai do catálogo do site.",async()=>{
    await fsDel("produtos",id); toast("Produto excluído."); painelLoja(lojaAtual.id,lojaAtual.ehAdmin);
  },"Excluir");
}

/* ===== IMPORTAÇÃO de lista de produtos (CSV) ===== */
function importarProdutos(){
  abrirModal("Importar lista de produtos",`
    <div class="ajuda">
      Cole uma linha por produto, com colunas separadas por <code>;</code> (ou vírgula/tab):<br>
      <code>nome ; categoria ; preço ; preço promocional</code><br>
      As duas últimas colunas são opcionais. Cabeçalho é detectado automaticamente.
      <br><br>Exemplo:<br><code>Arroz 5kg ; Mercearia ; 27,90 ; 22,90</code>
    </div>
    <div class="campo"><label>Colar lista (CSV)</label>
      <textarea id="imp-txt" rows="8" style="font-family:ui-monospace,Menlo,Consolas,monospace;font-size:13px" placeholder="Arroz tipo 1 — 5kg ; Mercearia ; 27,90 ; 22,90&#10;Feijão carioca — 1kg ; Mercearia ; 8,49&#10;Banana prata — kg ; Hortifruti ; 4,99 ; 3,49"></textarea>
    </div>
    <div class="campo"><label>Ou enviar arquivo .csv / .txt</label><input id="imp-arq" type="file" accept=".csv,.txt"></div>
    <div id="imp-previa"></div>
  `,`
    <button class="btn fantasma" onclick="fecharModal()">Cancelar</button>
    <button class="btn" id="imp-ok">Importar produtos</button>
  `);
  $("#imp-arq").addEventListener("change",e=>{
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader(); r.onload=()=>{ $("#imp-txt").value=r.result; previaImport(); }; r.readAsText(f,"utf-8");
  });
  $("#imp-txt").addEventListener("input",previaImport);
  $("#imp-ok").onclick=async()=>{
    const itens=parseCSVProdutos($("#imp-txt").value);
    if(!itens.length) return toast("Nada para importar. Confira o formato.",true);
    $("#imp-ok").disabled=true;
    try{
      const lote=writeBatch(db);
      itens.forEach(it=>{ lote.set(doc(collection(db,"produtos")),{...it,supermercadoId:lojaAtual.id}); });
      await lote.commit();
      toast(`${itens.length} produto(s) importado(s).`);
      fecharModal(); painelLoja(lojaAtual.id,lojaAtual.ehAdmin);
    }catch(e){ console.error(e); toast("Erro ao importar na nuvem.",true); $("#imp-ok").disabled=false; }
  };
}
function parseNum(s){
  if(s==null) return NaN;
  s=String(s).replace(/[r$\s]/gi,"").trim();
  if(!s) return NaN;
  if(s.includes(",")) s=s.replace(/\./g,"").replace(",",".");
  return parseFloat(s);
}
function parseCSVProdutos(texto){
  const linhas=texto.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
  const out=[];
  linhas.forEach((l,i)=>{
    const cols=l.split(/[;,\t]/).map(c=>c.trim());
    const nome=cols[0];
    if(!nome) return;
    const precoCol=parseNum(cols[2]);
    if(i===0 && (/nome|produto|item/i.test(nome)) && isNaN(precoCol)) return;
    const preco=isNaN(precoCol)?0:precoCol;
    let cat=cols[1]||"Outros";
    cat=CATEGORIAS.find(c=>c.toLowerCase()===cat.toLowerCase())||"Outros";
    const promo=parseNum(cols[3]);
    out.push({nome,categoria:cat,emoji:EMOJI_CAT[cat]||"🛒",preco,foto:"",
      precoPromocional:isNaN(promo)?null:promo,emPromocao:!isNaN(promo)&&promo>0,unidade:"un"});
  });
  return out;
}
function previaImport(){
  const itens=parseCSVProdutos($("#imp-txt").value);
  const box=$("#imp-previa");
  if(!itens.length){ box.innerHTML=""; return; }
  box.innerHTML=`<div class="ajuda" style="background:#eef6f4">✓ <b>${itens.length}</b> produto(s) prontos: ${itens.slice(0,4).map(i=>esc(i.nome)).join(", ")}${itens.length>4?"…":""}</div>`;
}

/* ===== OFERTAS / banners (com foto) ===== */
function renderOfertas(ofertas){
  const c=$("#loja-corpo");
  let html=`<div class="titulo-secao">
      <div><h2>Ofertas em destaque</h2><div class="sub">Viram banners no topo e rodapé do site do cliente</div></div>
      <button class="btn oferta" onclick="formOferta()">+ Nova oferta</button>
    </div>`;
  if(!ofertas.length){ c.innerHTML=html+vazioHTML("🏷️","Nenhuma oferta","Crie um banner para destacar suas promoções","formOferta()","+ Nova oferta"); return; }
  html+=`<div class="banners">`;
  for(const o of ofertas){
    const foto=o.foto?`<div class="bg" style="background-image:url('${o.foto}')"></div>`:"";
    html+=`<div class="banner ${o.cor==='verde'?'verde':''} ${o.foto?'com-foto':''}">
      ${foto}
      <div class="ed">
        <button class="btn fantasma peq" style="background:rgba(255,255,255,.9)" onclick="formOferta('${o.id}')">Editar</button>
        <button class="btn peq" style="background:rgba(255,255,255,.9);color:var(--preco-promo)" onclick="excluirOferta('${o.id}')">🗑</button>
      </div>
      <div class="et">Oferta</div><h3>${esc(o.titulo)}</h3><p>${esc(o.descricao||"")}</p>
      ${o.validade?`<span class="val">${esc(o.validade)}</span>`:""}
    </div>`;
  }
  html+=`</div>`; c.innerHTML=html;
}
async function formOferta(id=null){
  let ed=null;
  try{ ed=id?await fsGet("ofertas",id):null; }
  catch(e){ console.error(e); toast("Erro ao carregar dados da oferta.",true); return; }
  if(id&&!ed){ toast("Oferta não encontrada.",true); return; }
  abrirModal(ed?"Editar oferta":"Nova oferta",`
    <div class="campo"><label>Título</label><input id="o-tit" value="${esc(ed?.titulo||"")}" placeholder="Ex.: Semana da Mercearia"></div>
    <div class="campo"><label>Descrição</label><textarea id="o-desc" placeholder="Resumo para o cliente">${esc(ed?.descricao||"")}</textarea></div>
    <div class="linha-campos">
      <div class="campo"><label>Validade</label><input id="o-val" value="${esc(ed?.validade||"")}" placeholder="Ex.: Até domingo"></div>
      <div class="campo"><label>Cor do banner</label><select id="o-cor"><option value="laranja" ${ed?.cor!=="verde"?"selected":""}>Laranja (promoção)</option><option value="verde" ${ed?.cor==="verde"?"selected":""}>Verde (hortifruti)</option></select></div>
    </div>
    ${campoFotoHTML("o-foto","Imagem do banner (opcional)",ed?.foto||"","🏷️")}
  `,`
    <button class="btn fantasma" onclick="fecharModal()">Cancelar</button>
    <button class="btn oferta" id="o-salvar">${ed?"Salvar":"Publicar"}</button>
  `);
  ligarCampoFoto("o-foto");
  $("#o-salvar").onclick=async()=>{
    const titulo=$("#o-tit").value.trim();
    if(!titulo) return toast("Dê um título à oferta.",true);
    const obj={supermercadoId:lojaAtual.id,titulo,descricao:$("#o-desc").value.trim(),validade:$("#o-val").value.trim(),cor:$("#o-cor").value,foto:FOTOS["o-foto"]||""};
    $("#o-salvar").disabled=true;
    try{
      if(ed){ await fsSet("ofertas",id,obj); toast("Oferta atualizada."); }
      else{ await fsAdd("ofertas",obj); toast("Oferta publicada."); }
      fecharModal(); painelLoja(lojaAtual.id,lojaAtual.ehAdmin);
    }catch(e){ console.error(e); toast("Erro ao salvar.",true); $("#o-salvar").disabled=false; }
  };
}
function excluirOferta(id){
  confirmar("Excluir oferta","O banner deixa de aparecer no site.",async()=>{
    await fsDel("ofertas",id); toast("Oferta removida."); painelLoja(lojaAtual.id,lojaAtual.ehAdmin);
  },"Excluir");
}
